<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proceso de Limpieza VDC 360°</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}
.container{max-width:1200px;margin:auto;padding:20px;}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
input,select{padding:10px;border-radius:8px;border:1px solid #ccc;}
button{padding:10px 14px;border:none;border-radius:8px;background:#0a7a3b;color:white;cursor:pointer;font-weight:bold;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border-bottom:1px solid #ddd;}
.num{text-align:right;}
.pill{padding:8px 12px;border-radius:999px;font-size:12px;font-weight:bold;}
.ok{background:#e6f7ee;color:#0a7a3b;}
.warn{background:#fff3cd;color:#856404;}
.danger{background:#fdecea;color:#b91c1c;}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>Configuración</h2>

<div class="row">
<input type="date" id="fecha">
<select id="producto">
<option value="Menudo">Menudo</option>
<option value="Libro">Libro</option>
<option value="Pata">Pata</option>
</select>

<input type="number" id="precioSucio" placeholder="Precio automático" readonly>
</div>

<div class="row" style="margin-top:10px;">
<span class="pill" id="pillProducto">Producto: -</span>
<span class="pill warn" id="pillOrigen">Origen: 0</span>
<span class="pill warn" id="pillProcesado">Procesado: 0</span>
<span class="pill warn" id="pillEstado">Sin capturas</span>
</div>

</div>

<div class="card">
<h3>Origen (Producto sucio)</h3>

<div class="row">
<select id="descOrigen">
<option value="Rastro">Rastro</option>
<option value="Viaje">Viaje</option>
</select>

<input type="number" id="kgOrigen" placeholder="Kg">
<input type="number" id="pzsOrigen" placeholder="Pzs">
<button onclick="addOrigen()">Agregar</button>
</div>

<table>
<thead>
<tr><th>Origen</th><th>Kg</th><th>Pzs</th><th></th></tr>
</thead>
<tbody id="tbOrigen"></tbody>
</table>

</div>

<div class="card">
<h3>Procesado (Producto limpio)</h3>

<div class="row">
<select id="descProc">
<option value="Rastro">Rastro</option>
<option value="Viaje">Viaje</option>
</select>

<input type="number" id="kgProc" placeholder="Kg">
<input type="number" id="pzsProc" placeholder="Pzs">
<button onclick="addProc()">Agregar</button>
</div>

<table>
<thead>
<tr><th>Origen</th><th>Kg</th><th>Pzs</th><th></th></tr>
</thead>
<tbody id="tbProc"></tbody>
</table>

</div>

<div class="card">
<h3>Resumen</h3>

<div id="resumen"></div>

<button onclick="guardar()">Guardar en Supabase</button>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
'https://lujroedkbgffobyblbie.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
);

let origen=[];
let proc=[];

function hoy(){
return new Date().toISOString().slice(0,10);
}

function getViajeDate(fecha){
let d=new Date(fecha);
let day=d.getDay();

if(day==3||day==4) d.setDate(d.getDate()-1);
else if(day==5) d.setDate(d.getDate()-1);
else if(day==6) d.setDate(d.getDate()-1);
else if(day==1||day==2) d.setDate(d.getDate()-3);

return d.toISOString().slice(0,10);
}

async function cargarPrecio(){
let fecha=document.getElementById('fecha').value;
let producto=document.getElementById('producto').value;

let viaje=getViajeDate(fecha);

let mapa={
Menudo:"Panza",
Libro:"Libro",
Pata:"Pata"
};

let {data}=await supabase
.from('costos_finales_por_producto')
.select('*')
.eq('producto', mapa[producto])
.eq('fecha_viaje_aplicable', viaje)
.limit(1);

if(data && data.length){
document.getElementById('precioSucio').value=data[0].costo_final;
}else{
document.getElementById('precioSucio').value=0;
}
}

function actualizarEstado(){
document.getElementById('pillProducto').textContent="Producto: "+producto.value;
document.getElementById('pillOrigen').textContent="Origen: "+origen.length;
document.getElementById('pillProcesado').textContent="Procesado: "+proc.length;

let estado=document.getElementById('pillEstado');

if(!origen.length && !proc.length){
estado.textContent="Sin capturas";
estado.className="pill warn";
}
else if(origen.length && !proc.length){
estado.textContent="Falta procesado";
estado.className="pill danger";
}
else{
estado.textContent="Completo";
estado.className="pill ok";
}
}

function addOrigen(){
origen.push({
desc:descOrigen.value,
kg:Number(kgOrigen.value||0),
pzs:Number(pzsOrigen.value||0)
});
render();
}

function addProc(){
proc.push({
desc:descProc.value,
kg:Number(kgProc.value||0),
pzs:Number(pzsProc.value||0)
});
render();
}

function render(){
tbOrigen.innerHTML=origen.map((r,i)=>`
<tr>
<td>${r.desc}</td>
<td class="num">${r.kg}</td>
<td class="num">${r.pzs}</td>
<td><button onclick="origen.splice(${i},1);render()">X</button></td>
</tr>`).join('');

tbProc.innerHTML=proc.map((r,i)=>`
<tr>
<td>${r.desc}</td>
<td class="num">${r.kg}</td>
<td class="num">${r.pzs}</td>
<td><button onclick="proc.splice(${i},1);render()">X</button></td>
</tr>`).join('');

calcular();
actualizarEstado();
}

function calcular(){
let kgO=origen.reduce((a,b)=>a+b.kg,0);
let kgP=proc.reduce((a,b)=>a+b.kg,0);

let precio=Number(precioSucio.value||0);

let compra=kgO*precio;
let final=kgP?compra/kgP:0;

resumen.innerHTML=`
<p>Kg origen: ${kgO}</p>
<p>Kg limpio: ${kgP}</p>
<p>Precio compra: $${compra.toFixed(2)}</p>
<p>Precio final limpio: $${final.toFixed(2)}</p>
`;
}

async function guardar(){
await supabase.from('procesos_limpieza').insert({
fecha:fecha.value,
producto:producto.value,
precio_sucio_kg:Number(precioSucio.value),
kg_origen:origen.reduce((a,b)=>a+b.kg,0),
kg_procesado:proc.reduce((a,b)=>a+b.kg,0),
origen_detalle:origen,
procesado_detalle:proc
});
alert("Guardado");
}

fecha.value=hoy();
fecha.addEventListener('change',cargarPrecio);
producto.addEventListener('change',cargarPrecio);

cargarPrecio();
actualizarEstado();

</script>

</body>
</html>
